<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neko lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --purple: #a855f7;
      --purple-bright: #c084fc;
      --purple-pale: #e9d5ff;
      --text: #ede9fe;
      --muted: #a78bfa;
      --dim: #6b21a8;
    }

    html, body { height: 100%; overflow: hidden; }

    @media (hover: hover) and (pointer: fine) {
      * { cursor: none; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      text-transform: lowercase;
    }

    /* static atmospheric gradient — purple + black */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(168, 85, 247, 0.28), transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 110%, rgba(124, 58, 237, 0.18), transparent 60%),
        radial-gradient(circle 50% at 10% 50%, rgba(168, 85, 247, 0.10), transparent 50%),
        radial-gradient(circle 50% at 90% 50%, rgba(168, 85, 247, 0.10), transparent 50%);
      animation: breathe 18s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }

    /* custom cursor dot */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--purple);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      left: 0; top: 0;
      transition:
        width 0.25s cubic-bezier(0.4, 0, 0.2, 1),
        height 0.25s cubic-bezier(0.4, 0, 0.2, 1),
        background 0.25s,
        border 0.25s;
      box-shadow: 0 0 14px rgba(168, 85, 247, 0.9);
      will-change: transform;
      opacity: 0;
    }

    .cursor.hover {
      width: 38px;
      height: 38px;
      background: rgba(168, 85, 247, 0.12);
      border: 1px solid var(--purple);
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.5);
    }

    /* layout */
    .shell {
      position: relative;
      z-index: 2;
      max-width: 460px;
      width: 100%;
    }

    .card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(168, 85, 247, 0.15);
      border-radius: 28px;
      padding: 44px 36px 32px;
      box-shadow:
        inset 0 1px 0 rgba(168, 85, 247, 0.10),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02),
        0 30px 80px -20px rgba(168, 85, 247, 0.20),
        0 60px 100px -30px rgba(0, 0, 0, 0.9);
    }

    .head {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
      color: var(--text);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      font-weight: 400;
    }

    .status::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--purple);
      box-shadow: 0 0 10px var(--purple);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.6), 0 0 10px var(--purple); }
      50%      { opacity: 0.4; box-shadow: 0 0 0 8px rgba(168, 85, 247, 0), 0 0 10px var(--purple); }
    }

    .subtitle {
      margin-top: 22px;
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.65;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.85;
    }

    .browsers {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 28px;
    }

    .browser {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 18px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(168, 85, 247, 0.12);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .browser::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.18), transparent 65%);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }

    .browser:hover {
      border-color: rgba(168, 85, 247, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px -10px rgba(168, 85, 247, 0.4);
    }

    .browser:hover::before { opacity: 1; }
    .browser:hover .arrow  { transform: translateX(4px); color: var(--purple-bright); }

    .browser > * { position: relative; }

    .bname {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .arrow {
      font-size: 14px;
      color: var(--muted);
      opacity: 0.5;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .foot {
      text-align: center;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.15em;
      font-weight: 400;
    }

    .foot code {
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 26px 28px; }
      h1 { font-size: 26px; }
      .browsers { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <div class="shell">
    <div class="card">

      <div class="head">
        <h1>neko lab</h1>
        <span class="status">online</span>
        <p class="subtitle">
          sandbox de navegação isolado.<br>
          escolha um navegador para iniciar.
        </p>
      </div>

      <div class="browsers">
        <a class="browser" id="ff" href="#">
          <span class="bname">firefox</span>
          <span class="arrow">→</span>
        </a>
        <a class="browser" id="ch" href="#">
          <span class="bname">chromium</span>
          <span class="arrow">→</span>
        </a>
      </div>

      <div class="foot">
        <code id="host"></code>
      </div>

    </div>
  </div>

  <script>
    const cursor = document.querySelector('.cursor');

    document.addEventListener('mousemove', (e) => {
      cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
      cursor.style.opacity = '1';
    });

    document.querySelectorAll('a, .browser').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

    const isDemo = location.hostname.includes('github.io') || location.hostname === 'localhost';
    const ff = document.getElementById('ff');
    const ch = document.getElementById('ch');
    const host = document.getElementById('host');

    if (isDemo) {
      host.textContent = 'your-lab.duckdns.org';
      document.querySelector('.status').textContent = 'demo';
      ff.href = 'https://github.com/dgolaus/neko-lab';
      ch.href = 'https://github.com/dgolaus/neko-lab';
    } else {
      host.textContent = location.host;
      ff.href = '//firefox.' + location.host;
      ch.href = '//chrome.'  + location.host;
    }
  </script>

</body>
</html>
